.opt-btn:hover{border-color:var(--color-border-primary)}
.opt-btn.active-trend{background:#E6F1FB;border-color:#378ADD;color:#0C447C}

.card-base{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:16px 18px;margin-bottom:12px}

.bar-label{font-size:12px;color:var(--color-text-secondary);width:76px;flex-shrink:0}

.delta-dn{background:#FCEBEB;color:#A32D2D}

.memo-text{font-size:13px;color:var(--color-text-secondary);line-height:1.7;margin:0}
.rebalance-table{width:100%;font-size:12px;border-collapse:collapse;margin-top:4px}
.rebalance-table th{font-weight:500;color:var(--color-text-secondary);text-align:left;padding:4px 8px 6px;border-bottom:0.5px solid var(--color-border-tertiary)}

.rebal-ok{color:#3B6D11}
.rebal-warn{color:#854F0B;font-weight:500}

.rebal-total-warn{color:#A32D2D;font-weight:500}
.rebal-total-row td{border-top:1px solid var(--color-border-secondary);background:var(--color-background-secondary);font-weight:500}
.rules-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.rule-item{background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:10px 12px}

.warn-box-extreme{background:#3D0000;color:#FFB3B3;border:0.5px solid #A32D2D}
.legend-row{display:flex;gap:16px;margin-bottom:10px;font-size:12px;color:var(--color-text-secondary);align-items:center}
.legend-swatch{width:12px;height:5px;border-radius:2px;display:inline-block;margin-right:3px}
.pending{opacity:.4;pointer-events:none}
.rebal-section-note{font-size:11px;color:var(--color-text-tertiary);margin-left:auto}
.rate-hint{font-size:11px;color:var(--color-text-tertiary);margin-top:5px;line-height:1.4}
.ls-notice{font-size:11px;color:var(--color-text-tertiary);display:flex;align-items:center;gap:4px;margin-top:6px}
.ls-dot{width:6px;height:6px;border-radius:50%;background:#B4B2A9;display:inline-block}
.ls-dot-ok{background:#639922}
</style>

const S={trend:null,vix:null,rate:null,vixVal:null};
let FUND=100;
let currentTarget=null;

// ── 基準 ──
const BASE={beta:30,global:20,defense:20,alpha:10,hedge:10,cash:10};

};

function lsTest(){
  try{
    localStorage.setItem('__ls_test__','1');
    localStorage.removeItem('__ls_test__');
    lsAvailable=true;
    document.getElementById('ls-dot').className='ls-dot ls-dot-ok';
    document.getElementById('ls-msg').textContent='參數已啟用本機儲存，下次開啟自動載入';
  }catch(e){
    document.getElementById('ls-msg').textContent='本機儲存不可用（claude.ai 限制），參數不會保留';
  }
}

function lsSave(){
  if(!lsAvailable) return;
  try{
    const data={
      trend:S.trend,vix:S.vix,rate:S.rate,vixVal:S.vixVal,
      fund:FUND,
      taiex:document.getElementById('taiex-input').value,
      ma60:document.getElementById('ma60-input').value,
      vixInput:document.getElementById('vix-input').value,
      rateNow:document.getElementById('rate-now').value,
      ratePrev:document.getElementById('rate-prev').value,
      rebalInputs:{...rebalInputs}
    };
    localStorage.setItem(LS_KEY,JSON.stringify(data));
  }catch(e){}
}

function lsLoad(){
  if(!lsAvailable) return;
  try{
    const raw=localStorage.getItem(LS_KEY);
    if(!raw) return;
    const d=JSON.parse(raw);
    if(d.fund){FUND=d.fund;document.getElementById('fund-input').value=d.fund;document.getElementById('fund-label').textContent=`總資金 ${FUND} 萬`;}
    if(d.taiex) document.getElementById('taiex-input').value=d.taiex;
    if(d.ma60)  document.getElementById('ma60-input').value=d.ma60;
    if(d.vixInput) document.getElementById('vix-input').value=d.vixInput;
    if(d.rateNow)  document.getElementById('rate-now').value=d.rateNow;
    if(d.ratePrev) document.getElementById('rate-prev').value=d.ratePrev;
    if(d.rebalInputs) Object.assign(rebalInputs,d.rebalInputs);
    // 觸發數值重新計算
    if(d.taiex&&d.ma60) onIndexInput();
    if(d.vixInput) onVixInput();
    if(d.rateNow&&d.ratePrev) onRateInput();
    // 若數值輸入沒觸發到，手動還原按鈕狀態
    if(d.trend&&!S.trend) setBtn('trend',d.trend);
    if(d.vix&&!S.vix)     setBtn('vix',d.vix);
    if(d.rate&&!S.rate)   setBtn('rate',d.rate);
    if(d.vixVal) S.vixVal=d.vixVal;
    tryRender();
  }catch(e){}
}

function setBtn(grp,val){
  const clsMap={
    trend:{above:'active-trend',flat:'active-trend',below:'active-trend'},
    vix:  {low:'active-vix-low',medium:'active-vix-med',high:'active-vix-high'},
    rate: {stable:'active-rate',rising:'active-rate',falling:'active-rate'}
  };
  document.querySelectorAll(`[data-grp="${grp}"]`).forEach(b=>b.classList.remove('active-trend','active-vix-low','active-vix-med','active-vix-high','active-rate'));
  const btn=document.querySelector(`[data-grp="${grp}"][data-val="${val}"]`);
  if(btn) btn.classList.add(clsMap[grp][val]);
  S[grp]=val;
}

// ── Regime 判定 ──
function getRegime(){
  const {trend,vix}=S;
  const vixVal=S.vixVal;
  if(vixVal!==null&&vixVal>35) return 'bear';
  if(trend==='below'||vix==='high') return 'bear';
  if(trend==='above'&&vix==='low')  return 'bull';
  return 'range';
}

// ── 計算目標（主 Regime + 利率 Modifier）──
function calcTarget(regime){
  const base={...REGIME_WEIGHTS[regime]};
  const mod=RATE_MODIFIER[S.rate]||{};
  Object.entries(mod).forEach(([k,delta])=>{
    if(base[k]!==undefined){
      base[k]=Math.max(0,base[k]+delta);
    }
  });
  // 確保總和為 100
  const sum=Object.values(base).reduce((a,b)=>a+b,0);
  if(sum!==100){
    // 用現金做補償
    base.cash=Math.max(0,base.cash+(100-sum));
  }
  return base;
}

function getBearTrigger(){
  const vixVal=S.vixVal;
  if(vixVal!==null&&vixVal>35)
    return {label:`極端恐慌 VIX ${vixVal.toFixed(1)}`,cls:'trigger-extreme'};
  const both=S.trend==='below'&&S.vix==='high';
  const vOnly=S.trend!=='below'&&S.vix==='high';
  const tOnly=S.trend==='below'&&S.vix!=='high';
  if(both)  return {label:'跌破季線 + VIX > 30',cls:'trigger-both'};
  if(vOnly) return {label:'VIX > 30 觸發',      cls:'trigger-vix'};
  if(tOnly) return {label:'跌破季線觸發',         cls:'trigger-trend'};
  return null;
}

// ── 自動切換按鈕 ──
function autoSelect(grp,val){
  if(S[grp]===val) return;
  setBtn(grp,val);
  tryRender();
}

function tryRender(){
  if(S.trend&&S.vix&&S.rate){
    document.getElementById('out').classList.remove('pending');
    render();
  }
  lsSave();
}

// ── 數值輸入 ──
function onIndexInput(){
  const idx=parseFloat(document.getElementById('taiex-input').value);
  const ma =parseFloat(document.getElementById('ma60-input').value);
  const badge=document.getElementById('trend-badge');
  if(isNaN(idx)||isNaN(ma)||idx<=0||ma<=0){badge.style.display='none';return;}
  const pct=(idx-ma)/ma*100;
  let val,label,cls;
  if(pct>2)      {val='above';label=`季線上方 +${pct.toFixed(1)}%`;cls='nb-above';}
  else if(pct<-2){val='below';label=`跌破季線 ${pct.toFixed(1)}%`; cls='nb-below';}
  else           {val='flat'; label=`季線附近 ${pct>=0?'+':''}${pct.toFixed(1)}%`;cls='nb-flat';}
  badge.textContent=label;badge.className=`num-badge ${cls}`;badge.style.display='inline-block';
  autoSelect('trend',val);
}

function onVixInput(){
  const v=parseFloat(document.getElementById('vix-input').value);
  const badge=document.getElementById('vix-badge');
  if(isNaN(v)||v<=0){badge.style.display='none';S.vixVal=null;lsSave();return;}
  S.vixVal=v;
  let val,label,cls;
  if(v>35)      {val='high';  label=`極端恐慌 ${v.toFixed(1)} ⚠`;cls='nb-extreme';}
  else if(v>=30){val='high';  label=`高恐慌 ${v.toFixed(1)}`;     cls='nb-high';}
  else if(v>=20){val='medium';label=`中恐慌 ${v.toFixed(1)}`;     cls='nb-med';}
  else          {val='low';   label=`低恐慌 ${v.toFixed(1)}`;     cls='nb-low';}
  badge.textContent=label;badge.className=`num-badge ${cls}`;badge.style.display='inline-block';
  autoSelect('vix',val);
}

function onRateInput(){
  const now =parseFloat(document.getElementById('rate-now').value);
  const prev=parseFloat(document.getElementById('rate-prev').value);
  const badge=document.getElementById('rate-badge');
  if(isNaN(now)||isNaN(prev)){badge.style.display='none';return;}
  const diff=now-prev;
  let val,label,cls;
  if(diff>0.25)      {val='rising'; label=`升息 +${diff.toFixed(2)}%`;cls='nb-rising';}
  else if(diff<-0.25){val='falling';label=`降息 ${diff.toFixed(2)}%`; cls='nb-falling';}
  else               {val='stable'; label=`穩定 ${diff>=0?'+':''}${diff.toFixed(2)}%`;cls='nb-stable';}
  badge.textContent=label;badge.className=`num-badge ${cls}`;badge.style.display='inline-block';
  autoSelect('rate',val);
}

function onFundChange(){
  const v=parseFloat(document.getElementById('fund-input').value);
  FUND=isNaN(v)||v<=0?100:v;
  document.getElementById('fund-label').textContent=`總資金 ${FUND} 萬`;
  if(S.trend&&S.vix&&S.rate) render();
  lsSave();
}

function pick(el,grp,val,cls){
  document.querySelectorAll(`[data-grp="${grp}"]`).forEach(b=>{
    b.classList.remove('active-trend','active-vix-low','active-vix-med','active-vix-high','active-rate');
  });
  el.classList.add(cls);
  S[grp]=val;
  if(grp==='vix'){S.vixVal=null;document.getElementById('vix-input').value='';document.getElementById('vix-badge').style.display='none';}
  tryRender();
}

// ── 主渲染 ──
function render(){
  const regime=getRegime();
  const target=calcTarget(regime);
  currentTarget=target;
  const meta=REGIME_META[regime];

  // Banner
  const banner=document.getElementById('regime-banner');
  banner.className=`regime-banner ${meta.bannerCls}`;
  document.getElementById('regime-dot').style.background=meta.dotColor;
  document.getElementById('regime-name').textContent=meta.label;
  document.getElementById('regime-sub').textContent=meta.sub;
  const trigEl=document.getElementById('regime-trigger');
  if(regime==='bear'){const t=getBearTrigger();trigEl.innerHTML=t?`<span class="trigger-tag ${t.cls}">${t.label}</span>`:'`';}
  else trigEl.innerHTML='';

  // Modifier tags
  const modRow=document.getElementById('modifier-row');
  const rate=S.rate;
  if(rate==='rising'){
    modRow.innerHTML=`<span class="mod-tag mod-rising"><i class="ti ti-arrow-up" style="font-size:10px"></i> 升息 Modifier：避險 −5%，現金 +5%</span>`;
  }else if(rate==='falling'){
    modRow.innerHTML=`<span class="mod-tag mod-falling"><i class="ti ti-arrow-down" style="font-size:10px"></i> 降息 Modifier：避險 +5%，現金 −5%</span>`;
  }else{
    modRow.innerHTML=`<span class="mod-tag mod-neutral">利率穩定，無修正因子</span>`;
  }

  // 長條圖
  const bars=document.getElementById('bars');
  bars.innerHTML='';
  const keys=Object.keys(BASE);
  const maxVal=Math.max(...keys.map(k=>Math.max(BASE[k],target[k])));
  keys.forEach(k=>{
    const b=BASE[k],t=target[k],diff=t-b;
    const bPct=Math.round(b/maxVal*100),tPct=Math.round(t/maxVal*100);
    const dc=diff>0?'delta-up':diff<0?'delta-dn':'delta-ne';
    const ds=diff>0?`+${diff}%`:diff<0?`${diff}%`:'±0';
    const amt=(FUND*t/100).toFixed(1);
    const isFixed=FIXED_KEYS.includes(k);
    const natureCls=isFixed?'bar-nature-fixed':'bar-nature-dyn';
    const natureLabel=isFixed?'固定':'動態';
    bars.innerHTML+=`<div class="bar-row">
      <span class="bar-label">${LABELS[k]}</span>
      <span class="bar-nature ${natureCls}">${natureLabel}</span>
      <div class="bar-track">
        <div class="bar-base-fill" style="width:${bPct}%"></div>
        <div class="bar-target-fill" style="width:${tPct}%;background:${COLORS[k]}"></div>
      </div>
      <span class="bar-val">${t}%</span>
      <span class="bar-amt">${amt}萬</span>
      <span class="delta-badge ${dc}">${ds}</span>
    </div>`;
  });

  // 執行清單
  const al=document.getElementById('actions');
  al.innerHTML='';
  ACTIONS[regime].forEach(a=>{al.innerHTML+=`<li class="action-item"><i class="ti ${a.icon}" aria-hidden="true"></i><span>${a.text}</span></li>`;});
  document.getElementById('memo').textContent=MEMOS[regime];

  renderRebalTable();

  // 硬規則
  const rg=document.getElementById('rules-grid');
  rg.innerHTML='';
  RULES_BASE.forEach(r=>{
    const ok=r.ok.map(l=>`<p class="rule-line ok"><i class="ti ti-check" style="font-size:11px"></i> ${l}</p>`).join('');
    const no=r.no.map(l=>`<p class="rule-line no"><i class="ti ti-x" style="font-size:11px"></i> ${l}</p>`).join('');
    rg.innerHTML+=`<div class="rule-item"><p class="rule-name">${r.name}</p>${ok}${no}</div>`;
  });

  // 警示
  const wa=document.getElementById('warn-area');
  wa.innerHTML='';
  const vixVal=S.vixVal;
  if(regime==='bear'&&vixVal!==null&&vixVal>35){
    wa.innerHTML=`<div class="warn-box warn-box-extreme"><i class="ti ti-alert-triangle" style="font-size:13px;margin-right:4px"></i>極端恐慌覆蓋：VIX ${vixVal.toFixed(1)} 超過 35，強制進入熊市防禦。停止一切加碼，等待 VIX 回落至 30 以下再評估。</div>`;
  }else if(regime==='bear'){
    wa.innerHTML=`<div class="warn-box"><i class="ti ti-alert-triangle" style="font-size:13px;margin-right:4px"></i>硬規則：衛星標的出現跳空缺口或單日跌幅 > 3%，禁止動用現金加碼。等待 VIX 回落至 25 以下再評估進場。</div>`;
  }else if(S.vix==='high'){
    wa.innerHTML=`<div class="warn-box"><i class="ti ti-alert-triangle" style="font-size:13px;margin-right:4px"></i>VIX > 30 高恐慌區間。現金保留充足備用，嚴禁一次性重壓。</div>`;
  }
}

function renderRebalTable(){
  const tbody=document.getElementById('rebal-body');
  tbody.innerHTML='';
  const ref=currentTarget||BASE;
  let totalPct=0,totalAmt=0;
  REBAL_KEYS.forEach(k=>{
    const tgt=ref[k],cur=rebalInputs[k];
    const diff=+(cur-tgt).toFixed(1);
    const warn=Math.abs(diff)>=5;
    const amt=+(FUND*cur/100).toFixed(1);
    totalPct+=cur;totalAmt+=amt;
    const advice=diff>0?'偏高，建議減碼':diff<0?'偏低，建議加碼':'維持';
    tbody.innerHTML+=`<tr>
      <td>${LABELS[k]}</td><td>${tgt}%</td>
      <td><input type="number" min="0" max="100" step="1" value="${cur}"
        style="width:56px;font-size:12px;padding:3px 6px;border-radius:4px;border:0.5px solid var(--color-border-secondary);background:var(--color-background-secondary);color:var(--color-text-primary);font-family:var(--font-sans)"
        oninput="updateRebal('${k}',this.value)"/></td>
      <td style="color:var(--color-text-secondary)">${amt}</td>
      <td class="${warn?'rebal-warn':'rebal-ok'}">${diff>0?'+':''}${diff}%</td>
      <td class="${warn?'rebal-warn':'rebal-ok'}">${warn?'⚠ '+advice:'—'}</td>
    </tr>`;
  });
  const over=totalPct>100,under=totalPct<100;
  const tpEl=document.getElementById('rebal-total-pct');
  tpEl.textContent=`${totalPct.toFixed(1)}%`;
  tpEl.className=over||under?'rebal-total-warn':'rebal-total-ok';
  document.getElementById('rebal-total-amt').textContent=totalAmt.toFixed(1);
  const tmEl=document.getElementById('rebal-total-msg');
  if(over){tmEl.textContent='⚠ 超過 100%，請檢查';tmEl.className='rebal-total-warn';}
  else if(under){tmEl.textContent=`尚有 ${(100-totalPct).toFixed(1)}% 未配置`;tmEl.className='rebal-total-warn';}
  else{tmEl.textContent='配置完整';tmEl.className='rebal-total-ok';}
  lsSave();
}

function updateRebal(k,val){
  const v=parseFloat(val);
  rebalInputs[k]=isNaN(v)?0:v;
  renderRebalTable();
}

// ── 初始化 ──
lsTest();
lsLoad();
</script>
