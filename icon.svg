<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192">
  <rect width="192" height="192" rx="36" fill="#1B2232"/>
  <!-- Bar chart columns -->
  <rect x="36" y="112" width="24" height="52" rx="5" fill="#378ADD" opacity="0.9"/>
  <rect x="70" y="80"  width="24" height="84" rx="5" fill="#7F77DD" opacity="0.9"/>
  <rect x="104" y="56" width="24" height="108" rx="5" fill="#1D9E75" opacity="0.9"/>
  <rect x="138" y="90" width="24" height="74"  rx="5" fill="#D85A30" opacity="0.9"/>
  <!-- Baseline -->
  <rect x="28" y="166" width="140" height="2.5" rx="1.25" fill="#4A5568" opacity="0.5"/>
  <!-- Trend line -->
  <polyline points="48,112 82,80 116,56 150,90"
    stroke="#639922" stroke-width="4" fill="none"
    stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Trend dots -->
  <circle cx="48"  cy="112" r="5" fill="#639922"/>
  <circle cx="82"  cy="80"  r="5" fill="#639922"/>
  <circle cx="116" cy="56"  r="5" fill="#639922"/>
  <circle cx="150" cy="90"  r="5" fill="#639922"/>
  <!-- Top label bar -->
  <rect x="36" y="22" width="56" height="6" rx="3" fill="#378ADD" opacity="0.5"/>
  <rect x="100" y="22" width="30" height="6" rx="3" fill="#7F77DD" opacity="0.4"/>
  <rect x="138" y="22" width="20" height="6" rx="3" fill="#1D9E75" opacity="0.4"/>
</svg>
